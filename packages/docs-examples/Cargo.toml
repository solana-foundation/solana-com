[workspace]
resolver = "2"
members = ["cookbook/*/*/rust"]

[workspace.package]
edition = "2021"
publish = false

[workspace.dependencies]
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
solana-client = "2"
solana-commitment-config = "2"
solana-sdk = "2"
solana-system-interface = "1"
solana-account-decoder-client-types = "2"
solana-compute-budget-interface = "2"
solana-transaction-status-client-types = "2"
spl-token-interface = "1"
spl-token-2022-interface = "1"
spl-memo-interface = "1"
tiny-bip39 = "1"
base64 = "0.22"
bincode = "1"
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
