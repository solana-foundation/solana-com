schema: spec-driven

context: |
  ## Tech Stack
  - **Framework**: Next.js 15 (App Router) with React 19
  - **Language**: TypeScript 5.8 (strict mode disabled)
  - **CMS**: Keystatic (Git-backed headless CMS, migrated from TinaCMS)
  - **Styling**: Tailwind CSS 4.x, tw-animate-css
  - **Animation**: Motion (formerly Framer Motion)
  - **UI**: Radix UI, Headless UI, shadcn/ui pattern with CVA
  - **i18n**: next-intl with 20 supported locales
  - **Monorepo**: pnpm 10 workspaces, Turborepo
  - **Deployment**: Vercel (project: solana-com-media)

  ## Architecture
  - App Router with `[locale]` dynamic routing for all public routes
  - Server components fetch data via Keystatic Reader API
  - Client components handle interactivity (server → client pattern)
  - Content stored as MDX/JSON in `content/` directory
  - Admin UI at `/keystatic` (GitHub OAuth in prod, local mode in dev)
  - Asset prefix: `/media-assets`
  - Shared packages: `@solana-com/ui-chrome`, `@workspace/i18n`, `@workspace/ui`

  ## Conventions
  - Prettier: 80 char width, 2-space indent, double quotes, semicolons, ES5 trailing commas
  - ESLint: next/core-web-vitals + prettier
  - No formal test suite — manual testing and type checking
  - Pre-commit hooks: Husky + lint-staged (ESLint + Prettier)
  - Git branches: `feat/*`, `fix/*`, etc. off `main`

  ## Domain
  - Solana blockchain ecosystem content: news, podcasts, DeFi, NFTs, Web3
  - Multi-language global audience
  - Content types: posts, podcasts, authors, categories, tags, CTAs, switchbacks, links
  - Proxied through solana.com main site via Next.js rewrites

rules:
  proposal:
    - Focus on why the change is needed and what it impacts
    - List all files/directories being added, removed, or modified
    - Note breaking changes and migration requirements
    - Keep the "Preserved Functionality" section to confirm what stays unchanged
  design:
    - Include concrete file paths and directory structure
    - Reference existing patterns in the codebase
    - Specify environment variable changes
    - Cover both local dev and production deployment concerns
  spec:
    - One spec per bounded capability (e.g., content-management, auth, routing)
    - Include data models, API contracts, and component interfaces
    - Reference Keystatic collection schemas where relevant
  tasks:
    - Break into independently testable chunks
    - Order tasks by dependency (removals before additions, config before implementation)
    - Include manual verification steps for content migrations
    - Flag tasks that affect shared monorepo packages or Vercel deployment config
