summary: >-
  Before a transaction can be executed, every account it may read from or write
  to must be loaded, including any programs it may call. The amount of data a
  transaction is allowed to load is capped, and if it exceeds that limit,
  loading is aborted. This functionality is already implemented in the
  validator.
