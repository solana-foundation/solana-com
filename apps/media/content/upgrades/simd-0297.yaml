summary: >-
  This proposal relaxes the handling of invalid durable nonce transactions
  during block replay. Instead of rejecting the entire block when an invalid
  nonce is encountered, the transaction should be marked as failed, skipped for
  state modifications, but still committed to the block without charging a
  transaction fee.
