summary: >-
  This proposal adds a new hash, **Accounts Lattice Hash**, that uses
  homomorphic hashing to maintain a hash of the total account state. The
  **Accounts Lattice Hash** is both fast to update, and secure, enabling (1)
  every block to contain the hash of all accounts, instead of only the accounts
  changed in that block, and (2) removing the **Epoch Accounts Hash**.
