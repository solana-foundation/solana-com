summary: >-
  We propose augmenting `BlockMarkerV1`, introduced in SIMD-0307, to include
  `BlockHeader` and `UpdateParent` variants. `BlockHeader`, placed at the
  beginning of a block, indicates the parent of the block. `UpdateParent`
  signals that the intended parent is different from what was initially
  indicated, paving the way for Fast Leader Handover support in Alpenglow
  (section 2.7 of https://www.anza.xyz/alpenglow-1-1).
