summary: >-
  Historically, messages transmitted over the network must not exceed the IPv6
  MTU size to ensure a fast and reliable network delivery. Solana has used a
  conservative MTU size of 1280 bytes, which after accounting for some of the
  overhead, leaves a maximum transaction size of 1232 bytes for data in the
  payload.
