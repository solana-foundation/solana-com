summary: >-
  The `alt_bn128_pairing` syscall takes a byte slice as input, interprets the
  bytes as an array of pairs of g1 and g2 points on bn128 elliptic curve, and
  applies a pairing operation. If the byte slice input has an improper length,
  the function should terminate early. Specifically, if the byte slice length is
  not a multiple of 192 (the sum of the lengths of g1 and g2 points), the
  function should terminate early with an error.
