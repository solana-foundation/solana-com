summary: >-
  The transaction scheduler and the runtime both demote transaction write locks
  for builtin programs and sysvars using a static list of reserved IDs. This
  proposal replaces the currently used static lists of builtin program and
  sysvar IDs with a dynamic set of reserved account keys that can be updated at
  epoch boundaries with feature gates.
