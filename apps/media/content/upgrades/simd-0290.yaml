summary: >-
  This proposal aims to relax the handling of invalid fee payers in Solana.
  Currently, if a transaction with an invalid fee payer is included in a block,
  the entire block is rejected. This proposal suggests that instead of rejecting
  the entire block, the transaction with the invalid fee payer should simply
  skip execution.
