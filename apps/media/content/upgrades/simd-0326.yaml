summary: >-
  This proposal changes the core consensus protocol from the current one, based
  on **Proof-of-History** and **TowerBFT**, to **Alpenglow**, specifically the
  **Votor** parts of Alpenglow. Compared to the old protocol, **Alpenglow**
  offers higher resilience and better performance.
