upgrade: simd-0185
publishedAt: 2026-02-03T00:00:00.000Z
expectedRelease: Agave 3.1
body: >-
  Vote Account V4 is under development. Current vote accounts use space
  inefficiently — over 40% stores a history of previous authorized voters that
  is rarely needed. V4 removes unnecessary historical tracking and introduces
  separate commission settings for inflation rewards and block revenue from
  transaction fees. Vote Account V4 is a foundational requirement for block
  revenue distribution to delegators and Alpenglow.
