upgrade: simd-0326
publishedAt: 2026-02-03T00:00:00.000Z
body: >-
  Alpenglow is under development, expected by Agave 4.1. It is a new consensus
  protocol that will bring 150ms confirmation times to Solana. Proof of History
  and onchain vote transactions will be removed in favor of a simpler finality
  mechanism. Alpenglow introduces VAT (Validator Admission Ticket) — a 1.6 SOL
  fee validators must pay each epoch to join the consensus set. This paves the
  way for faster block times and increased CU capacity with the removal of vote
  transactions from blocks.
