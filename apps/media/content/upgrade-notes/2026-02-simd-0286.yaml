upgrade: simd-0286
publishedAt: 2026-02-03T00:00:00.000Z
expectedRelease: Agave 4.1
body: >-
  100M CU block limit increase is under development. SIMD-286 proposes raising
  the block limit from 60 million to 100 million compute units — a 66% boost in
  capacity. Early testing with XDP shows that 100M CU blocks are achievable when
  validator operators adopt XDP for block propagation. This means more
  transactions per block, higher throughput, and reduced congestion during peak
  demand.
