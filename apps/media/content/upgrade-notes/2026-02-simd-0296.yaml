slug: 2026-02-simd-0296
upgrade: simd-0296
publishedAt: 2026-02-03T00:00:00.000Z
expectedRelease: Agave 4.1
body: >-
  Larger transaction size is under development. Transactions are currently
  limited to 1,232 bytes, restricting program composability. SIMD-296 enables
  more expressive transactions that can interact with more programs and accounts
  in a single atomic operation, reducing the need for awkward multi-step
  execution patterns. Core engineers have accepted this proposal.
