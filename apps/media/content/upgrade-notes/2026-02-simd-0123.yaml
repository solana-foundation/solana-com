slug: 2026-02-simd-0123
upgrade: simd-0123
publishedAt: 2026-02-03T00:00:00.000Z
body: >-
  Block Revenue Distribution is under development, expected by Agave 4.1.
  SIMD-123 enables validators to share block revenue (transaction fees, priority
  fees, and MEV) with their delegators automatically through the protocol.
  Validators will set a commission rate for block revenue, and the protocol will
  distribute the remaining revenue to delegators at the end of each epoch based
  on their stake.
