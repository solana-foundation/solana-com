upgrade: simd-0437
publishedAt: 2026-02-03T00:00:00.000Z
body: >-
  Rent reduction is under development, expected by Agave 4.0. The proposal will
  gradually reduce lamports per byte in a series of feature activations,
  allowing new Solana accounts to be created at a reduced rent amount. This
  makes it more affordable for developers to build applications and for users to
  interact with the network, potentially reducing costs by up to 90%.
