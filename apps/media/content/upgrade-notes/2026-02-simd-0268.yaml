slug: 2026-02-simd-0268
upgrade: simd-0268
publishedAt: 2026-02-03T00:00:00.000Z
expectedRelease: Agave 4.1
body: >-
  CPI nesting limit increase is under development. SIMD-268 raises the
  Cross-Program Invocation nesting depth from 4 to 8, doubling the depth of
  program-to-program calls. This enables developers to build more complex
  decentralized applications that compose multiple protocols together.
