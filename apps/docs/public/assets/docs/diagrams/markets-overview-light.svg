<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="144" viewBox="0 108 1200 144" role="img" aria-labelledby="title">
  <title id="title">A market transaction on Solana</title>
  <style>
    .label{fill:#11131a;font:600 22px Diatype,Helvetica,sans-serif}.meta{fill:#4b5565;font:15px Diatype,Helvetica,sans-serif}.line,.arrow{fill:none;stroke:#8490a3;stroke-width:2}
  </style>
  <path class="line" d="M230 180H270M470 180H510M710 180H750M950 180H990"/><path class="arrow" d="M260 173L270 180L260 187M500 173L510 180L500 187M740 173L750 180L740 187M980 173L990 180L980 187"/>
  <g><rect x="30" y="110" width="200" height="140" rx="16" fill="#fff" stroke="#9945ff" stroke-width="2"/><text class="label" x="130" y="170" text-anchor="middle">Market data</text><text class="meta" x="130" y="199" text-anchor="middle">prices + liquidity</text></g>
  <g><rect x="270" y="110" width="200" height="140" rx="16" fill="#fff" stroke="#7257f6" stroke-width="2"/><text class="label" x="370" y="170" text-anchor="middle">Quote</text><text class="meta" x="370" y="199" text-anchor="middle">route + slippage</text></g>
  <g><rect x="510" y="110" width="200" height="140" rx="16" fill="#fff" stroke="#21d4fd" stroke-width="2"/><text class="label" x="610" y="170" text-anchor="middle">Sign</text><text class="meta" x="610" y="199" text-anchor="middle">approve transaction</text></g>
  <g><rect x="750" y="110" width="200" height="140" rx="16" fill="#fff" stroke="#18d9ba" stroke-width="2"/><text class="label" x="850" y="170" text-anchor="middle">Programs</text><text class="meta" x="850" y="199" text-anchor="middle">execute atomically</text></g>
  <g><rect x="990" y="110" width="180" height="140" rx="16" fill="#fff" stroke="#14f195" stroke-width="2"/><text class="label" x="1080" y="170" text-anchor="middle">Settlement</text><text class="meta" x="1080" y="199" text-anchor="middle">update balances</text></g>
</svg>
