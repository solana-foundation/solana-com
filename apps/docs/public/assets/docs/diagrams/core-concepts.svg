<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title">
  <title id="title">How Solana accounts, programs, instructions, transactions, PDAs, CPIs, and fees relate</title>
  <style>
    .label{fill:#f4f6fb;font:600 23px Diatype,Helvetica,sans-serif}.label-small{fill:#f4f6fb;font:600 19px Diatype,Helvetica,sans-serif}.meta{fill:#a2a9b8;font:16px Diatype,Helvetica,sans-serif}.edge{fill:#788195;font:600 12px Diatype,Helvetica,sans-serif;letter-spacing:.3px}.line,.arrow{fill:none;stroke:#566074;stroke-width:2}
  </style>
  <path class="line" d="M290 140H370M805 205H690V140H630M440 205V265H160V335M560 205V335M960 315V355"/>
  <path class="arrow" d="M300 133L290 140L300 147M360 133L370 140L360 147M640 133L630 140L640 147M153 325L160 335L167 325M553 325L560 335L567 325M953 345L960 355L967 345"/>
  <text class="edge" x="330" y="125" text-anchor="middle">read + write</text>
  <text class="edge" x="660" y="125" text-anchor="middle">calls</text>
  <text class="edge" x="290" y="251" text-anchor="middle">derives</text>
  <text class="edge" x="585" y="277">invokes</text>
  <text class="edge" x="985" y="341">pays</text>
  <g>
    <rect x="30" y="75" width="260" height="130" rx="16" fill="#12151d" stroke="#9945ff" stroke-width="2"/>
    <text class="label" x="160" y="124" text-anchor="middle">Accounts</text>
    <text class="meta" x="160" y="160" text-anchor="middle">Store onchain state</text>
  </g>
  <g>
    <rect x="370" y="75" width="260" height="130" rx="16" fill="#12151d" stroke="#7257f6" stroke-width="2"/>
    <text class="label" x="500" y="124" text-anchor="middle">Programs</text>
    <text class="meta" x="500" y="160" text-anchor="middle">Define stateless logic</text>
  </g>
  <g>
    <rect x="30" y="335" width="260" height="130" rx="16" fill="#12151d" stroke="#9945ff" stroke-width="2"/>
    <text class="label-small" x="160" y="367" text-anchor="middle"><tspan x="160">Program-derived</tspan><tspan x="160" dy="22">addresses (PDAs)</tspan></text>
    <text class="meta" x="160" y="429" text-anchor="middle">Provide deterministic addresses</text>
  </g>
  <g>
    <rect x="370" y="335" width="260" height="130" rx="16" fill="#12151d" stroke="#21d4fd" stroke-width="2"/>
    <text class="label-small" x="500" y="367" text-anchor="middle"><tspan x="500">Cross-program</tspan><tspan x="500" dy="22">invocations (CPIs)</tspan></text>
    <text class="meta" x="500" y="429" text-anchor="middle">Call another program</text>
  </g>
  <g>
    <rect x="760" y="35" width="400" height="280" rx="18" fill="#12151d" stroke="#18d9ba" stroke-width="2"/>
    <text class="label" x="960" y="79" text-anchor="middle">Transactions</text>
    <text class="meta" x="960" y="111" text-anchor="middle">Execute instructions atomically</text>
    <rect x="805" y="145" width="310" height="120" rx="14" fill="#0b0d12" stroke="#21d4fd" stroke-width="2"/>
    <text class="label" x="960" y="190" text-anchor="middle">Instructions</text>
    <text class="meta" x="960" y="228" text-anchor="middle">Call one program</text>
  </g>
  <g>
    <rect x="830" y="355" width="260" height="110" rx="16" fill="#12151d" stroke="#14f195" stroke-width="2"/>
    <text class="label" x="960" y="400" text-anchor="middle">Fees</text>
    <text class="meta" x="960" y="437" text-anchor="middle">Price transaction execution</text>
  </g>
</svg>
