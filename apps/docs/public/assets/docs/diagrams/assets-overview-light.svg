<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title">
  <title id="title">How token instructions update a mint and token accounts</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#8490a3" stroke-width="1.7"/>
    </marker>
  </defs>
  <style>
    .label{fill:#11131a;font:600 22px Diatype,Helvetica,sans-serif}.meta{fill:#4b5565;font:15px Diatype,Helvetica,sans-serif}.small{fill:#11131a;font:600 16px Diatype,Helvetica,sans-serif}.edge-label{fill:#667085;font:14px Diatype,Helvetica,sans-serif}.line{fill:none;stroke:#8490a3;stroke-width:2;marker-end:url(#arrow)}.both{fill:none;stroke:#8490a3;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
  </style>

  <path class="line" d="M290 210H370"/>
  <path class="line" d="M650 190H710V105H800"/>
  <path class="line" d="M650 230H710V310H760"/>
  <path class="line" d="M975 170V245"/>
  <g><rect x="40" y="145" width="250" height="130" rx="16" fill="#fff" stroke="#9945ff" stroke-width="2"/><text class="label" x="165" y="199" text-anchor="middle">Wallet or app</text><text class="meta" x="165" y="229" text-anchor="middle">Signs token instructions</text></g>
  <g><rect x="370" y="145" width="280" height="130" rx="16" fill="#fff" stroke="#21d4fd" stroke-width="2"/><text class="label" x="510" y="199" text-anchor="middle">Token Program</text><text class="meta" x="510" y="229" text-anchor="middle">Applies rules and updates state</text></g>
  <g><rect x="800" y="40" width="350" height="130" rx="16" fill="#fff" stroke="#18d9ba" stroke-width="2"/><text class="label" x="975" y="94" text-anchor="middle">Mint account</text><text class="meta" x="975" y="124" text-anchor="middle">Defines the asset, supply, and authorities</text></g>
  <g><rect x="760" y="245" width="390" height="150" rx="16" fill="#fff" stroke="#14f195" stroke-width="2"/><text class="label" x="955" y="283" text-anchor="middle">Token accounts</text><text class="meta" x="955" y="307" text-anchor="middle">Store owner balances for this mint</text><rect x="790" y="320" width="146" height="50" rx="12" fill="none" stroke="#18d9ba" stroke-width="1.5"/><text class="small" x="863" y="350" text-anchor="middle">Alice · 90</text><rect x="974" y="320" width="146" height="50" rx="12" fill="none" stroke="#14f195" stroke-width="1.5"/><text class="small" x="1047" y="350" text-anchor="middle">Bob · 10</text></g>
  <path class="both" d="M936 345H974"/>
</svg>
