<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="154" viewBox="0 103 1200 154" role="img" aria-labelledby="title">
  <title id="title">Applications connect to Solana through RPC</title>
  <style>
    .label{fill:#f4f6fb;font:600 23px Diatype,Helvetica,sans-serif}.meta{fill:#9299aa;font:15px Diatype,Helvetica,sans-serif}.route{font:600 12px Diatype,Helvetica,sans-serif;letter-spacing:.2px}.line,.arrow{fill:none;stroke:#566074;stroke-width:2}
  </style>
  <path class="line" d="M270 180H370M590 180H660M880 180H950"/><path class="arrow" d="M280 173L270 180L280 187M360 173L370 180L360 187M650 173L660 180L650 187M940 173L950 180L940 187"/>
  <text class="route" x="320" y="163" text-anchor="middle" fill="#21d4fd">HTTP</text><text class="route" x="320" y="211" text-anchor="middle" fill="#14f195">WebSocket</text>
  <g><rect x="50" y="105" width="220" height="150" rx="16" fill="#12151d" stroke="#9945ff" stroke-width="2"/><text class="label" x="160" y="171" text-anchor="middle">Application</text><text class="meta" x="160" y="201" text-anchor="middle">client or backend</text></g>
  <g><rect x="370" y="105" width="220" height="150" rx="16" fill="#12151d" stroke="#21d4fd" stroke-width="2"/><text class="label" x="480" y="171" text-anchor="middle">RPC endpoint</text><text class="meta" x="480" y="201" text-anchor="middle">requests + subscriptions</text></g>
  <g><rect x="660" y="105" width="220" height="150" rx="16" fill="#12151d" stroke="#18d9ba" stroke-width="2"/><text class="label" x="770" y="171" text-anchor="middle">Validator</text><text class="meta" x="770" y="201" text-anchor="middle">reads + sends</text></g>
  <g><rect x="950" y="105" width="200" height="150" rx="16" fill="#12151d" stroke="#14f195" stroke-width="2"/><text class="label" x="1050" y="171" text-anchor="middle">Network</text><text class="meta" x="1050" y="201" text-anchor="middle">accounts + programs</text></g>
</svg>
