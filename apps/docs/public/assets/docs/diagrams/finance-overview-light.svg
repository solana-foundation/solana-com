  <style>
    .label{fill:#11131a;font:600 23px Diatype,Helvetica,sans-serif}.meta{fill:#4b5565;font:15px Diatype,Helvetica,sans-serif}.line,.arrow{fill:none;stroke:#8490a3;stroke-width:2}
