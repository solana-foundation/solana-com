schema: spec-driven

context: |
  Product: Breakpoint 2026 marketing site built as a dedicated app in apps/breakpoint.
  Repo shape: This app lives inside the solana-com monorepo and should follow workspace conventions used by sibling apps such as apps/accelerate and apps/docs.
  Tech stack: Next.js 15 App Router, React 19, TypeScript, Tailwind CSS, monorepo workspace dependencies, pnpm, Turbo.
  Localization: Use the shared @workspace/i18n package for locale config, routing, middleware, navigation helpers, and message loading. Do not invent a parallel i18n setup.
  Design direction: The app must be a completely new design and build for Breakpoint 2026. The legacy project at /Users/karambit/Sites/solana-com-breakpoint is reference-only for fonts, colors, textures, and selected media such as the existing sizzle video.
  Content model: Prefer static app-local content and message files for the first release. Do not assume CMS, Sanity, Prisma, or external APIs are needed unless explicitly requested.
  UX goals: Single-page brochure experience, section-based navigation, strong visual hierarchy, mobile and desktop support, accessible CTA placement, and high-quality motion used intentionally rather than excessively.
  Delivery bias: Favor a smaller number of well-built sections over recreating the entire legacy Breakpoint site. Exclude schedules, speakers, sponsors, maps, and live-event tooling unless the change explicitly calls for them.
  Asset handling: If fonts, textures, or video references are reused from the legacy Breakpoint project, copy approved assets into apps/breakpoint so the app does not depend on external local paths at runtime.
  Verification: Implementation should include linting, type-checking, production build validation, and at least lightweight smoke coverage for key rendering, navigation, and localization behavior.

rules:
  proposal:
    - Keep proposals focused on product scope and user-facing capability, not implementation trivia.
    - State clearly when a change is a new design rather than a migration or component port.
    - Call out integration with shared monorepo packages when relevant, especially @workspace/i18n.
  specs:
    - Write requirements that are testable and reflect the single-page brochure experience.
    - Include explicit requirements for localization whenever page copy, routing, or CTAs are in scope.
    - Treat legacy Breakpoint references as brand inputs only unless the user explicitly requests a direct feature carryover.
  design:
    - Explain why the chosen approach fits a monorepo-native Next.js app.
    - Document scope boundaries so the app does not drift into rebuilding the old Breakpoint platform.
    - Note any required asset extraction or content migration steps from the legacy Breakpoint repository.
  tasks:
    - Order tasks by dependency: scaffold, shared integration, design system foundation, content, page sections, testing, verification.
    - Include localization setup and verification whenever user-facing copy is part of the change.
    - Prefer small, verifiable tasks that can be completed in a single focused session.
