name: staging_media_format

on:
  push:
    branches:
      - staging
    paths:
      - "apps/media/content/**"
      - ".prettierignore"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: write

jobs:
  format-media-content:
    name: Format Media Content On Staging
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format media content
        run:
          pnpm exec prettier --ignore-path .prettierignore --write
          apps/media/content

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/media/content
          git commit -m "chore(media): auto-format staging content"
          git push
