name: media_auto_format

on:
  push:
    branches-ignore:
      - main
    paths:
      - "apps/media/content/**"
      - "apps/media/public/uploads/posts/**"
      - "apps/media/scripts/optimize-images.mjs"
      - ".prettierignore"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: write

jobs:
  format-media-content:
    name: Auto Format Media Content
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect changed media images
        id: changed-images
        shell: bash
        run: |
          files_path="$RUNNER_TEMP/changed-media-images.txt"
          before_sha="${{ github.event.before }}"

          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            git ls-files -z -- \
              'apps/media/content/**/*.png' \
              'apps/media/content/**/*.jpg' \
              'apps/media/content/**/*.jpeg' \
              'apps/media/public/uploads/posts/**/*.png' \
              'apps/media/public/uploads/posts/**/*.jpg' \
              'apps/media/public/uploads/posts/**/*.jpeg' > "$files_path"
          elif git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            git diff -z --name-only --diff-filter=ACMR "$before_sha" "${{ github.sha }}" -- \
              'apps/media/content/**/*.png' \
              'apps/media/content/**/*.jpg' \
              'apps/media/content/**/*.jpeg' \
              'apps/media/public/uploads/posts/**/*.png' \
              'apps/media/public/uploads/posts/**/*.jpg' \
              'apps/media/public/uploads/posts/**/*.jpeg' > "$files_path"
          else
            echo "Previous commit $before_sha is unavailable in the local clone. Falling back to tracked media images from HEAD."
            git diff -z --name-only --diff-filter=ACMR HEAD^ HEAD -- \
              'apps/media/content/**/*.png' \
              'apps/media/content/**/*.jpg' \
              'apps/media/content/**/*.jpeg' \
              'apps/media/public/uploads/posts/**/*.png' \
              'apps/media/public/uploads/posts/**/*.jpg' \
              'apps/media/public/uploads/posts/**/*.jpeg' > "$files_path" \
              || git ls-files -z -- \
                'apps/media/content/**/*.png' \
                'apps/media/content/**/*.jpg' \
                'apps/media/content/**/*.jpeg' \
                'apps/media/public/uploads/posts/**/*.png' \
                'apps/media/public/uploads/posts/**/*.jpg' \
                'apps/media/public/uploads/posts/**/*.jpeg' > "$files_path"
          fi

          if [ -s "$files_path" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Optimize changed media images
        if: steps.changed-images.outputs.has_files == 'true'
        shell: bash
        run: |
          xargs -0 pnpm media:optimize-images -- < "$RUNNER_TEMP/changed-media-images.txt"

      - name: Format media content
        run:
          pnpm exec prettier --ignore-path .prettierignore --write
          apps/media/content

      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/media/content apps/media/public/uploads/posts
          git commit -m "chore(media): auto-format media content"
          git push
