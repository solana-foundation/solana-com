name: Publish fab-menu

on:
  workflow_dispatch:
  push:
    tags:
      - "fab-menu-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish @solana-com/fab-menu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@solana-foundation"

      - name: Install dependencies
        run: pnpm --filter @solana-com/fab-menu... install --frozen-lockfile

      - name: Check package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/fab-menu/package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#fab-menu-v}
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Build package
        run: pnpm --filter @solana-com/fab-menu build

      - name: Publish package
        run: pnpm --filter @solana-com/fab-menu publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
