name: Vercel Redeploy

on:
  workflow_dispatch:
    inputs:
      project:
        description:
          "Target project slug from
          scripts/secrets-migration/projects.solana-apps.json"
        required: true
        type: choice
        options:
          - solana-com
          - solana-com-docs
          - solana-com-media
          - templates
          - solana-com-accelerate
          - solana-com-breakpoint-2
  repository_dispatch:
    types:
      - doppler_secrets_update

concurrency:
  group: vercel-redeploy
  cancel-in-progress: false

jobs:
  rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SECRETS_MIGRATION_MANIFEST:
        ${{ github.workspace
        }}/scripts/secrets-migration/projects.solana-apps.json
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve rollout target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            project="${{ inputs.project }}"
          else
            project="$(jq -r '.client_payload.project.id // .client_payload.project // empty' "${GITHUB_EVENT_PATH}")"
          fi

          if [[ -z "${project}" || "${project}" == "null" ]]; then
            echo "Missing target project in workflow input or repository_dispatch payload" >&2
            exit 1
          fi

          if ! jq -e --arg filter "${project}" '
            .projects[] | select(.vercel_project == $filter)
          ' "${SECRETS_MIGRATION_MANIFEST}" >/dev/null; then
            echo "Project ${project} is not present in ${SECRETS_MIGRATION_MANIFEST}" >&2
            exit 1
          fi

          echo "project=${project}" >> "${GITHUB_OUTPUT}"

      - name: Redeploy and smoke test
        shell: bash
        env:
          PROJECT_FILTER: ${{ steps.resolve.outputs.project }}
        run: |
          set -euo pipefail

          chmod +x ./scripts/secrets-migration/redeploy-from-vercel.sh
          ./scripts/secrets-migration/redeploy-from-vercel.sh

      - name: Upload redeploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:
            vercel-redeploy-${{ steps.resolve.outputs.project }}-${{
            github.run_id }}
          path: .secrets-migration/logs/
          if-no-files-found: ignore
