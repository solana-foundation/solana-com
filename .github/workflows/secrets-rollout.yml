name: Secrets Rollout

on:
  workflow_dispatch:
    inputs:
      project:
        description:
          "Target Vercel project slug from
          scripts/secrets-rollout/projects.solana-apps.json"
        required: true
        type: choice
        options:
          - solana-com
          - solana-com-docs
          - solana-com-media
          - templates
          - solana-com-accelerate
          - solana-com-breakpoint-2
  repository_dispatch:
    types:
      - doppler_secrets_update

concurrency:
  group: >-
    vercel-redeploy-${{ github.event.inputs.project ||
    github.event.client_payload.vercel_project ||
    github.event.client_payload.project.id ||
    github.event.client_payload.project.name || github.run_id }}
  cancel-in-progress: false

jobs:
  rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SECRETS_ROLLOUT_MANIFEST:
        ${{ github.workspace
        }}/scripts/secrets-rollout/projects.solana-apps.json
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install Safe Chain
        run: |
          npm install --global @aikidosec/safe-chain@1.5.7
          safe-chain setup-ci

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Vercel CLI
        run: npm install --global vercel@54.10.3

      - name: Resolve rollout target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            project="${{ github.event.inputs.project }}"
          else
            payload="$(jq -c '.client_payload // {}' "${GITHUB_EVENT_PATH}")"
            vercel_candidate="$(jq -r '.vercel_project // .vercelProject // empty' <<< "${payload}")"
            scalar_project="$(jq -r 'if (.project | type) == "string" then .project else empty end' <<< "${payload}")"
            doppler_project_id="$(jq -r '
              .doppler_project_id
              // (if (.project | type) == "object" then .project.id else empty end)
              // .doppler.project.id
              // empty
            ' <<< "${payload}")"
            doppler_project_name="$(jq -r '
              .doppler_project
              // (if (.project | type) == "object" then .project.name else empty end)
              // .doppler.project.name
              // empty
            ' <<< "${payload}")"
            doppler_config="$(jq -r '
              .doppler_config
              // (
                if (.config | type) == "object" then .config.name
                elif (.config | type) == "string" then .config
                else empty
                end
              )
              // .doppler.config.name
              // empty
            ' <<< "${payload}")"

            project="$(jq -r \
              --arg vercel "${vercel_candidate}" \
              --arg scalar "${scalar_project}" \
              --arg doppler_id "${doppler_project_id}" \
              --arg doppler_name "${doppler_project_name}" \
              --arg doppler_config "${doppler_config}" '
                def has_value($value): $value != "" and $value != "null";
                def config_matches:
                  (has_value($doppler_config) | not)
                  or ((.doppler_config // "") == "")
                  or ((.doppler_config // "") == $doppler_config);

                [
                  .projects[]
                  | select(
                      (has_value($vercel) and .vercel_project == $vercel)
                      or (
                        has_value($scalar)
                        and (.vercel_project == $scalar or (.doppler_project // "") == $scalar)
                      )
                      or (
                        (
                          (has_value($doppler_id) and (.doppler_project // "") == $doppler_id)
                          or (has_value($doppler_name) and (.doppler_project // "") == $doppler_name)
                        )
                        and config_matches
                      )
                    )
                  | .vercel_project
                ][0] // empty
              ' "${SECRETS_ROLLOUT_MANIFEST}")"
          fi

          if [[ -z "${project}" || "${project}" == "null" ]]; then
            echo "Could not resolve target project from workflow input or repository_dispatch payload" >&2
            exit 1
          fi

          if ! jq -e --arg filter "${project}" '
            .projects[] | select(.vercel_project == $filter)
          ' "${SECRETS_ROLLOUT_MANIFEST}" >/dev/null; then
            echo "Project ${project} is not present in ${SECRETS_ROLLOUT_MANIFEST}" >&2
            exit 1
          fi

          echo "project=${project}" >> "${GITHUB_OUTPUT}"

      - name: Redeploy and smoke test
        shell: bash
        env:
          PROJECT_FILTER: ${{ steps.resolve.outputs.project }}
        run: |
          set -euo pipefail

          chmod +x ./scripts/secrets-rollout/redeploy-from-vercel.sh
          ./scripts/secrets-rollout/redeploy-from-vercel.sh

      - name: Upload redeploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:
            vercel-redeploy-${{ steps.resolve.outputs.project }}-${{
            github.run_id }}
          path: .secrets-rollout/logs/
          if-no-files-found: ignore
