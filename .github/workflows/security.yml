name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan so new detection rules / advisories surface even
    # without code changes.
    - cron: "0 17 * * 1"

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          # Pinned binary. Verify against the official checksums when bumping:
          # https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_checksums.txt
          # (line: gitleaks_8.30.1_linux_x64.tar.gz)
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      - name: Scan full git history for secrets
        run: /tmp/gitleaks git --redact --exit-code 1 .

  dependency-audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for dependency changes
        id: dependency-changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- \
            package.json \
            ':(glob)**/package.json' \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            .github/workflows/security.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency inputs changed; the full audit runs on main and weekly."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip audit for unrelated pull request
        if:
          github.event_name == 'pull_request' &&
          steps.dependency-changes.outputs.changed != 'true'
        run: echo "Dependency audit not required for this pull request."
      - name: Install pnpm
        if:
          github.event_name != 'pull_request' ||
          steps.dependency-changes.outputs.changed == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
          run_install: false
      - name: Install Node.js
        if:
          github.event_name != 'pull_request' ||
          steps.dependency-changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Audit production dependencies
        if:
          github.event_name != 'pull_request' ||
          steps.dependency-changes.outputs.changed == 'true'
        # Fails on High/Critical advisories per the Solana Foundation SDLC.
        # Known-unfixable advisories are ignored via auditConfig.ignoreGhsas
        # in pnpm-workspace.yaml with a documented justification.
        run: pnpm audit --audit-level high --prod
