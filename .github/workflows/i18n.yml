name: Lingo.dev i18n

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Translation scope to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ui
          - docs

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  i18n-ui:
    name: Run i18n for shared UI catalogs
    concurrency:
      group: ${{ github.workflow }}-i18n
      cancel-in-progress: false
    if:
      github.event_name == 'push' || github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lingodotdev/lingo.dev@main
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          api-key: ${{ secrets.LINGODOTDEV_API_KEY }}
          pull-request: true
          pull-request-title: "i18n: Lingo (ui)"
          commit-message: "i18n: Lingo Translation Update (ui)"
          working-directory: "packages/i18n"
          parallel: true

  i18n-docs:
    name: Run i18n for docs content
    concurrency:
      group: ${{ github.workflow }}-i18n
      cancel-in-progress: false
    if:
      github.event_name == 'push' || github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'docs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lingodotdev/lingo.dev@main
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          api-key: ${{ secrets.LINGODOTDEV_API_KEY }}
          pull-request: true
          pull-request-title: "i18n: Lingo (docs)"
          commit-message: "i18n: Lingo Translation Update (docs)"
          working-directory: "apps/docs"
          parallel: true
