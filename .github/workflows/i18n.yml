name: Lingo.dev i18n

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  i18n:
    name: Run continuous localization
    concurrency:
      group: ${{ github.workflow }}-i18n
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - run: node scripts/i18n/verify-source-locales.mjs
      - name: Run Lingo.dev
        env:
          LINGO_API_KEY:
            ${{ secrets.LINGO_API_KEY || secrets.LINGODOTDEV_API_KEY }}
        run: |
          if [[ ! -f .lingo/lock.json ]]; then
            node scripts/i18n/verify-target-coverage.mjs
          fi
          npx --yes @lingo.dev/cli@latest push --wait
      - name: Verify docs frontmatter
        run: node scripts/i18n/verify-docs-frontmatter.mjs
      - name: Create signed pull request
        id: create-pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          sign-commits: true
          commit-message: "i18n: Lingo Translation Update"
          title: "i18n: Lingo"
          body:
            "Automated Lingo.dev translation update for UI catalogs and docs
            content."
          branch: i18n/lingo
          base: main
          delete-branch: true
          add-paths: |
            packages/i18n/messages
            apps/docs/content
            .lingo/lock.json
      - name: Verify pull request commits
        if:
          steps.create-pr.outputs.pull-request-operation != 'none' &&
          steps.create-pr.outputs.pull-request-commits-verified != 'true'
        run: |
          echo "Pull request commits were not verified by GitHub."
          exit 1
