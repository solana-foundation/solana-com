name: Lingo.dev i18n

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Translation scope to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ui
          - docs

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  i18n-ui:
    name: Run i18n for shared UI catalogs
    concurrency:
      group: ${{ github.workflow }}-i18n
      cancel-in-progress: false
    if:
      github.event_name == 'push' || github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/i18n/verify-source-locales.mjs
      - name: Import GPG signing key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.LINGODOTDEV_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.LINGODOTDEV_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - uses: lingodotdev/lingo.dev@a4664c984ca4caba4346f8e81e5823c0cda57789 # main
        env:
          GH_TOKEN: ${{ github.token }}
          LINGODOTDEV_COMMIT_AUTHOR_NAME: ${{ steps.import-gpg.outputs.name }}
          LINGODOTDEV_COMMIT_AUTHOR_EMAIL: ${{ steps.import-gpg.outputs.email }}
          LINGODOTDEV_GPG_SIGN: "true"
        with:
          api-key: ${{ secrets.LINGODOTDEV_API_KEY }}
          pull-request: true
          pull-request-title: "i18n: Lingo (ui)"
          commit-message: "i18n: Lingo Translation Update (ui)"
          working-directory: "packages/i18n"
          parallel: true

  i18n-docs:
    name: Run i18n for docs content
    concurrency:
      group: ${{ github.workflow }}-i18n
      cancel-in-progress: false
    if:
      github.event_name == 'push' || github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'docs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/i18n/verify-source-locales.mjs
      - name: Import GPG signing key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.LINGODOTDEV_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.LINGODOTDEV_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - uses: lingodotdev/lingo.dev@a4664c984ca4caba4346f8e81e5823c0cda57789 # main
        env:
          GH_TOKEN: ${{ github.token }}
          LINGODOTDEV_COMMIT_AUTHOR_NAME: ${{ steps.import-gpg.outputs.name }}
          LINGODOTDEV_COMMIT_AUTHOR_EMAIL: ${{ steps.import-gpg.outputs.email }}
          LINGODOTDEV_GPG_SIGN: "true"
        with:
          api-key: ${{ secrets.LINGODOTDEV_API_KEY }}
          pull-request: true
          pull-request-title: "i18n: Lingo (docs)"
          commit-message: "i18n: Lingo Translation Update (docs)"
          working-directory: "apps/docs"
          parallel: true
