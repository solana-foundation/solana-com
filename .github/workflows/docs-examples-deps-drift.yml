name: Docs examples — deps drift

# Bumps every JS dep in packages/docs-examples to its latest version and runs
# the suite. The point is to catch SDK breakage early — if @solana/kit or one
# of the spl-token packages publishes a release that breaks our cookbook
# snippets, this surfaces the failure on its own schedule rather than the next
# time someone touches the docs.

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  examples-ts-latest:
    name: TypeScript examples (latest deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10.15.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Cache Solana CLI
        id: solana-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: solana-cli-stable-${{ runner.os }}-v1

      - name: Install Solana CLI
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Add Solana CLI to PATH
        run:
          echo "$HOME/.local/share/solana/install/active_release/bin" >>
          "$GITHUB_PATH"

      # Armed before both the baseline install and the `pnpm update --latest`
      # bump below — newly published packages are exactly where supply-chain
      # malware lands, so this drift job is the highest-value place to scan.
      - name: Install Safe Chain
        run: |
          npm install --global @aikidosec/safe-chain
          safe-chain setup-ci

      - name: Install baseline deps
        run: pnpm install --frozen-lockfile

      - name: Bump docs-examples deps to latest
        working-directory: packages/docs-examples
        run: pnpm update --latest

      - name: Show resolved versions
        working-directory: packages/docs-examples
        run: pnpm ls --depth=0

      - name: Run docs-examples tests
        run: pnpm --filter @workspace/docs-examples test

      - name: Lint
        run: pnpm --filter @workspace/docs-examples lint
