# Dependabot keeps dependencies current and surfaces security patches as PRs.
# Pairs with the blocking `pnpm audit` gate in .github/workflows/security.yml
# (SDLC §3.2.2 Dependency Management, §3.3 Automated Security Testing).
version: 2
updates:
  # Application & package dependencies (pnpm workspace, single manifest tree).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      # Batch low-risk dev/tooling bumps so they don't flood review.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions used across .github/workflows. Keeps pinned action
  # versions patched (SDLC §3.3 — supply-chain).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
