packages:
  - apps/*
  - packages/*

# Avoid implicit installs (and repeated workspace lifecycle scripts) before
# every `pnpm run` and `pnpm exec`; CI and setup invoke install explicitly.
verifyDepsBeforeRun: false

catalog:
  next: 15.5.18
  next-intl: 4.13.0
  react: 19.2.6
  react-dom: 19.2.6
  vitest: 4.1.8

overrides:
  "@babel/runtime": 7.28.4
  browserslist: 4.25.4
  "@babel/plugin-transform-modules-systemjs@>=7.12.0 <=7.29.3": 7.29.4
  nth-check: 2.1.1
  typescript: 5.8.3
  "@react-aria/interactions": 3.25.6
  "basic-ftp@<5.3.1": 5.3.1
  "esbuild@>=0.17.0 <0.28.1": 0.28.1
  "fast-uri@<=3.1.1": 3.1.2
  "flatted@<=3.4.1": 3.4.2
  "form-data@>=4.0.0 <4.0.6": 4.0.6
  "glob@>=10.2.0 <10.5.0": 10.5.0
  "handlebars@>=4.0.0 <=4.7.8": 4.7.9
  "immutable@>=5.0.0 <5.1.5": 5.1.5
  "lodash-es@>=4.0.0 <=4.17.23": 4.18.1
  "minimatch@<3.1.4": 3.1.5
  "minimatch@>=8.0.0 <8.0.6": 8.0.6
  "minimatch@>=9.0.0 <9.0.7": 9.0.7
  "picomatch@<2.3.2": 2.3.2
  "picomatch@>=4.0.0 <4.0.4": 4.0.4
  "preact@>=10.27.0 <10.27.3": 10.27.3
  "rollup@>=4.0.0 <4.59.0": 4.59.0
  "serialize-javascript@<=7.0.2": 7.0.3
  "svgo@>=3.0.0 <3.3.3": 3.3.3
  "tar@<7.5.11": 7.5.11
  "tmp@<0.2.6": 0.2.6
  "undici@>=7.0.0 <7.28.0": 7.28.0
  "vite@>=7.0.0 <=7.3.4": 7.3.5
  "ws@>=7.0.0 <7.5.11": 7.5.11
  "ws@>=8.0.0 <8.21.0": 8.21.0

allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@swc/core": true
  bigint-buffer: true
  bufferutil: true
  core-js: false
  esbuild: true
  lz4: true
  sharp: true
  utf-8-validate: true

auditConfig:
  # Each entry MUST carry a justification (SDLC §3.2.2: "Own the gap").
  # Review these whenever a patched upstream release becomes available.
  ignoreGhsas:
    # @solana/spl-token depends on bigint-buffer and has no patched release.
    - GHSA-3gc7-fjrx-p6mg
    # thrift <0.23.0 — Uncontrolled Recursion. Reached only via
    # @databricks/sql, which pins thrift ^0.16.0; no patched @databricks/sql
    # release exists. thrift is a server-side RPC client (never bundled to the
    # browser) and only ever parses responses from the trusted Databricks SQL
    # backend, so the DoS surface is not externally reachable.
    - GHSA-r67j-r569-jrwp
    # thrift <=0.22.0 — Path Traversal / HTTP request-response splitting /
    # uncontrolled resource consumption. No upstream fix reachable through
    # @databricks/sql. Same containment as above: trusted-peer, server-only.
    - GHSA-526f-jxpj-jmg2
