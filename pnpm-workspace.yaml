packages:
  - apps/*
  - packages/*

# Avoid implicit installs (and repeated workspace lifecycle scripts) before
# every `pnpm run` and `pnpm exec`; CI and setup invoke install explicitly.
verifyDepsBeforeRun: false

catalog:
  next: 15.5.18
  next-intl: 4.13.0
  react: 19.2.6
  react-dom: 19.2.6
  vitest: 4.1.8

overrides:
  # Keep transitive build tooling on the release patched for GHSA-g7r4-m6w7-qqqr.
  "esbuild@>=0.17.0 <0.28.1": 0.28.1
  # No patched seti-icons release is available; its SVGO 1 chain requires
  # overriding nth-check across a major boundary.
  "nth-check@<2.0.1": 2.1.1
  # @databricks/sql 2 requires Thrift's UUID dependency to remain CJS-compatible.
  # Package-level overrides are not inherited by pnpm consumers.
  "thrift@0.23.0>uuid": 11.1.1

allowBuilds:
  "@parcel/watcher": true
  "@sentry/cli": true
  "@swc/core": true
  bigint-buffer: true
  bufferutil: true
  core-js: false
  esbuild: true
  lz4: true
  sharp: true
  utf-8-validate: true
